openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: aim-os
    description: NETWORX AIM OS — AI orchestration engine
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /run:
    post:
      operationId: runTask
      tags: [aim-os]
      summary: Execute a task through the AIM OS engine
      description: >
        Processes input through memory retrieval, planning, and swarm/single
        execution, then stores results back to memory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Execution result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"

  /memory:
    get:
      operationId: getMemory
      tags: [aim-os]
      summary: Retrieve all stored memory entries
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryList"

    delete:
      operationId: clearMemory
      tags: [aim-os]
      summary: Clear all memory
      responses:
        "200":
          description: Memory cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryClearedResult"

  /stats:
    get:
      operationId: getStats
      tags: [aim-os]
      summary: Get system stats — task count, swarm ratio, memory size
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RunRequest:
      type: object
      properties:
        input:
          type: string
          description: The task or query to process
      required:
        - input

    MemoryEntry:
      type: object
      properties:
        input:
          type: string
        output:
          type: string
        timestamp:
          type: number
        strength:
          type: number
        vector:
          type: number
        score:
          type: number
      required:
        - input
        - output
        - timestamp
        - strength
        - vector

    Plan:
      type: object
      properties:
        input:
          type: string
        complexity:
          type: number
        swarm:
          type: boolean
        memoryCount:
          type: number
      required:
        - input
        - complexity
        - swarm
        - memoryCount

    SwarmResult:
      type: object
      properties:
        swarm:
          type: boolean
        workers:
          type: array
          items:
            type: string
      required:
        - swarm
        - workers

    RunResponse:
      type: object
      properties:
        input:
          type: string
        plan:
          $ref: "#/components/schemas/Plan"
        memory:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        result:
          description: Either a string (single execution) or SwarmResult
        tokenAllowed:
          type: boolean
        executionMs:
          type: number
      required:
        - input
        - plan
        - memory
        - result
        - tokenAllowed
        - executionMs

    MemoryList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
        count:
          type: number
      required:
        - entries
        - count

    MemoryClearedResult:
      type: object
      properties:
        cleared:
          type: boolean
        count:
          type: number
      required:
        - cleared
        - count

    SystemStats:
      type: object
      properties:
        totalTasks:
          type: number
        swarmTasks:
          type: number
        singleTasks:
          type: number
        swarmRatio:
          type: number
        memorySize:
          type: number
        uptimeMs:
          type: number
      required:
        - totalTasks
        - swarmTasks
        - singleTasks
        - swarmRatio
        - memorySize
        - uptimeMs
