kind = "web"
previewPath = "/"
title = "NETWORX AIM OS"
version = "1.0.0"
id = "artifacts/aim-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20976

[services.development]
run = "pnpm --filter @workspace/aim-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aim-os", "run", "build" ]
publicDir = "artifacts/aim-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20976"
BASE_PATH = "/"
